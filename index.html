<!DOCTYPE html>
<html>
<head>
    <title>To-Do List Application</title>
    <style>
        /* CSS styles for the header */
        header {
            background-color: #f2f2f2;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>To-Do List Application</h1>
    </header>
    <main>
        <section>
            <h2>Tasks</h2>
            <ul>
                
            </ul>
        </section>
        <section>
            <h2>Add Task</h2>
            
            <input type="text" name="task" placeholder="Enter task name">
            <button type="button" onclick="addtask()">Add Task</button>
            
        </section>
        <script>
            function addtask(){
                var task = document.querySelector('input[name=task]').value;
                var ul = document.querySelector('ul');
                var li = document.createElement('li');
                li.textContent = task;
                ul.appendChild(li);
            }
        </script>

    </main>
</body>
</html>

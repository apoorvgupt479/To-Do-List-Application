<!DOCTYPE html>
<html>
<head>
    <title>To-Do List Application</title>
    <style>
        /* CSS styles for the header */
        header {
            background-color: #f2f2f2;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>To-Do List Application</h1>
    </header>
    <main>
        <section>
            <h2>Tasks</h2>
            <ul>
                <li>Task 1</li>
                <li>Task 2</li>
                <li>Task 3</li>
            </ul>
        </section>
        <section>
            <h2>Add Task</h2>
            <form>
                <input type="text" name="task" placeholder="Enter task name">
                <button type="submit">Add Task</button>
            </form>
        </section>


    </main>
</body>
</html>
